# ============================================================================
# Phase 1: High-Level Feature Understanding
# ============================================================================
# Interview Cycle 1 scope
phase1_feature_overview:

  feature_description:
    score: 95
    status: "complete"
    value: |
      New single-row TUI screen 'bgwriter' (hotkey `b`) combining pg_stat_bgwriter and
      pg_stat_checkpointer. Shows background-writer and checkpoint activity. Follows the
      pg_stat_wal view pattern exactly (single row, source label first, stats_age last,
      counters diffed per refresh interval). TUI (top) only — NOT recordable in 0.11.0.
    gaps: ""
    required: true

  user_problem:
    score: 90
    status: "complete"
    value: |
      No way in pgcenter to watch checkpoint/bgwriter behaviour: checkpoint frequency,
      timed vs requested ratio (signals undersized max_wal_size / aggressive manual
      checkpoints), write/sync time, buffers flushed by checkpointer vs bgwriter vs backends.
      overview.md wrongly claims bgwriter is supported — it never was.
    gaps: ""
    required: true

  target_users:
    score: 85
    status: "complete"
    value: "Practicing PostgreSQL DBAs tuning checkpoint/WAL behaviour and IO load during ops."
    gaps: ""
    required: false

  success_criteria:
    score: 80
    status: "partial"
    value: |
      Screen opens on `b`, shows correct columns per PG version (14-18), checkpoint event
      counters absolute-cumulative, work/time/buffer columns diffed per interval, stats_age
      from checkpointer on 17+. Unit tests for SelectStatBgwriterQuery across PG14-18 pass;
      query executes against live PG14-18.
    gaps: "Confirm restartpoints absolute; finalize acceptance criteria list in Cycle 2."
    required: true

  constraints:
    score: 90
    status: "complete"
    value: |
      PG 17 split: pre-17 all in pg_stat_bgwriter; 17+ checkpoint metrics in
      pg_stat_checkpointer, bgwriter reduced, buffers_backend/_fsync removed (→ pg_stat_io,
      out of scope). Variant A unified column headers across versions (MUST be documented).
      Single contiguous DiffIntvl range → absolute event-counters must sit at the start.
      MinRequiredVersion = PG14 (pgcenter's floor; bgwriter exists on all supported versions).
      NotRecordable: true (temporary) to avoid issue #122 report breakage.
    gaps: ""
    required: true

  testing_strategy:
    score: 90
    status: "complete"
    value: |
      Unit tests for SelectStatBgwriterQuery(version) across PG14-18 (mirror wal_test.go).
      Integration: query executes on live PG14/15/16/17/18 containers. No E2E needed.
    gaps: ""
    required: true

# ============================================================================
# Phase 2: User Experience & Scenarios
# ============================================================================
# Interview Cycle 2 scope (together with Phase 3)
phase2_user_experience:

  user_stories:
    score: 90
    status: "complete"
    value: |
      US1 (primary): As a DBA, I want to see timed vs requested checkpoint counts
      (ckpt_timed/ckpt_req, absolute), so I can detect WAL-pressure-forced checkpoints
      (high ckpt_req vs ckpt_timed => max_wal_size too small).
      US2: As a DBA, I want checkpoint write/sync time (ckpt_write,ms / ckpt_sync,ms, diffed)
      and buffers written (buf_ckpt), so I can assess checkpoint IO cost and spread.
      US3: As a DBA, I want to compare who flushes buffers — buf_clean (bgwriter) vs
      buf_backend (backends, pre-17) vs buf_ckpt — plus maxwritten, so I can tune
      bgwriter_lru_maxpages (high buf_backend + maxwritten => bgwriter not keeping up).
      US4: As a DBA on a standby, I want restartpoints (rstpt_timed/req/done, absolute), since
      on a replica ckpt_timed/req stay 0 and restartpoints accumulate.
      US5: As a DBA, I want stats_age, so I know the accumulation window for cumulative numbers
      and can spot a recent reset.
    gaps: ""
    required: true

  acceptance_criteria:
    score: 85
    status: "complete"
    value: |
      - Hotkey `b` opens the "bgwriter" screen from any other screen.
      - PG14-16: columns source, ckpt_timed, ckpt_req (absolute), ckpt_write,ms, ckpt_sync,ms,
        buf_ckpt, buf_clean, maxwritten, buf_backend, buf_backend_fsync, buf_alloc (diffed),
        stats_age (not diffed).
      - PG17+: columns source, ckpt_timed, ckpt_req, rstpt_timed, rstpt_req, rstpt_done
        (absolute), ckpt_write,ms, ckpt_sync,ms, buf_ckpt, buf_clean, maxwritten, buf_alloc
        (diffed), stats_age from pg_stat_checkpointer (not diffed). PG18 extra columns per docs
        (e.g. slru_written) included and verified on PG18 container.
      - Event counters (ckpt_*, rstpt_*) render as absolute cumulative; work/time/buffer
        columns render as per-interval deltas; stats_age is pass-through text.
      - Screen is NOT collected by `pgcenter record` (NotRecordable: true).
      - Unit tests for SelectStatBgwriterQuery cover PG14-18; query executes on live PG14-18.
    gaps: "Final exact PG18 column list confirmed at implementation against PG18 container."
    required: true

  edge_cases:
    score: 90
    status: "complete"
    value: |
      - stats_reset IS NULL (fresh cluster / never reset): now()-NULL = NULL => stats_age
        empty. Acceptable, same as wal view.
      - External pg_stat_reset_shared(...) during a session: a diffed column shows a negative
        delta for one tick. Existing pgcenter behaviour (same as wal), not fixed, documented.
      - buf_backend/buf_backend_fsync absent on PG17+ (variant A): columns simply not present;
        documented so it is not a surprise.
      - Standby: ckpt_timed/req == 0, rstpt_* accumulate, buffers still populated.
    gaps: ""
    required: true

  error_scenarios:
    score: 90
    status: "complete"
    value: |
      Query uses only pg_stat_bgwriter / pg_stat_checkpointer (readable by any role, no special
      privilege — unlike wal which uses pg_ls_waldir). No permission gating needed; screen works
      on any connection including PgBouncer (simple protocol). PG<14 filtered out by
      MinRequiredVersion. No additional error handling beyond standard query-error display.
    gaps: ""
    required: true

  verification_strategy:
    score: 88
    status: "complete"
    value: |
      Agent: unit tests for SelectStatBgwriterQuery(version) across PG14-18 (mirror
      wal_test.go) asserting query/ncols/DiffIntvl per version; integration test executing the
      query on live PG14/15/16/17/18 containers. User: manual `make build` + open screen on a
      PG17 and PG18 instance, confirm columns and absolute-vs-delta behaviour.
    gaps: ""
    required: true

  ui_ux_requirements:
    score: 90
    status: "complete"
    value: |
      Single-row screen, identical UX model to pg_stat_wal: header row of column names + one
      data row. Entered via `b`; left via any other view hotkey. Diffed columns refresh each
      interval; absolute columns show cumulative. Sorting and filtering not applicable
      (single row). Standard cmdline help/title. No new UI components invented.
    gaps: ""
    required: true

  risks:
    score: 85
    status: "complete"
    value: |
      - PG18 column set unverified by memory — mitigated: follow PG docs + verify on PG18
        container integration test before shipping.
      - Variant A tension (different columns per version) — mitigated: wal.go precedent for
        version-specific Ncols/DiffIntvl; documented for users.
      - DiffIntvl single contiguous range — mitigated: layout places all absolute event
        counters first, diffed block contiguous, stats_age last.
    gaps: ""
    required: true

  technical_decisions:
    score: 90
    status: "complete"
    value: |
      - Follow pg_stat_wal pattern: new internal/query/bgwriter.go with
        SelectStatBgwriterQuery(version) (string, int, [2]int); version literals 170000/180000
        (no PostgresV17/V18 constants exist).
      - Event counters (ckpt_*, rstpt_*) absolute (outside DiffIntvl); work/time/buffers diffed.
      - Cross-join pg_stat_checkpointer × pg_stat_bgwriter on PG17+; pg_stat_bgwriter only <17.
      - NotRecordable: true (temporary) — record/report deferred to a future feature.
      - stats_age from pg_stat_checkpointer on PG17+ (documented).
      - MinRequiredVersion = PostgresV14.
    gaps: ""
    required: false

