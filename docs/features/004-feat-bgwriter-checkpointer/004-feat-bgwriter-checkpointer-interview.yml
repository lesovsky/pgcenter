# ============================================================================
# Notes
# ============================================================================
notes: |
  FINAL DECISIONS after Phase 6 (dev-customer, needs_work) + Phase 7 (completeness, complete):

  D1 Column contract: per-version Ncols like wal.go (NOT NULL-padded unified). Each version
     returns only real columns; shared columns keep identical headers/order. PG14-16: no
     restartpoints. PG18: slru_written included as a real diffed column. ("variant A" in the
     roadmap means consistent headers for shared columns, NOT identical Ncols.)
  D2 record/report: live-only in 0.11.0 by design. NotRecordable: true. record/report is a
     planned backlog follow-up (docs/roadmap-0.11.0.md "Out of scope / backlog"), no committed
     date. Must be stated explicitly in the spec Limitations so "temporary" has an address.
  D3 No in-UI notice for version-varying columns. Follows the existing pg_stat_wal precedent
     (wal silently drops wal_write/sync on PG18). Column set reflects server capabilities;
     documented in help only. (dev-customer's "major" pushback rejected with reasoning: a
     bgwriter-specific notice would be inconsistent with how pgcenter already behaves.)
  D4 Help text: add `b bgwriter` to top/help.go as an acceptance criterion. Concrete placement
     requested by user: in the hotkey row currently "a,f,r,w" insert `b` between `a` and `f`
     to yield the sorted row "a,b,f,r,w".
  D5 Spec Limitations must note: (1) restartpoints are first to drop if the screen becomes
     overcrowded; (2) stats_age is taken from pg_stat_checkpointer — on a standby or after a
     separate pg_stat_reset_shared('bgwriter') it does not reflect the bgwriter reset.

  dev-customer minor #4 (screen named "bgwriter" while showing checkpointer data): accepted as
  a naming note; keep "bgwriter" (familiar, hotkey `b`), source column label clarifies content.
