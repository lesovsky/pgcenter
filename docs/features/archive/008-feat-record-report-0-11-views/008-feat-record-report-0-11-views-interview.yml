# ============================================================================
# Phase 1: High-Level Feature Understanding
# ============================================================================
phase1_feature_overview:

  feature_description:
    score: 90
    status: "complete"
    value: >
      Add record/report support for the four 0.11.0 TUI-only screens currently marked
      NotRecordable: bgwriter (pg_stat_bgwriter+checkpointer), replslots
      (pg_replication_slots LEFT JOIN pg_stat_replication_slots), pg_stat_io (two
      registered sub-views: stat_io count + stat_io_time), and statements_jit
      (pg_stat_statements JIT). Lift NotRecordable so `pgcenter record` collects them and
      `pgcenter report` can replay them, mirroring existing recordable SQL views
      (tables/activity/wal/statements_*). One spec covering all four; tech-spec tasks
      decomposed per-screen for risk isolation.
    gaps: ""
    required: true

  user_problem:
    score: 60
    status: "partial"
    value: >
      The four new 0.11.0 screens are TUI-live-only; their stats cannot be captured for
      offline/historical analysis with `pgcenter record` + `pgcenter report`. DBAs doing
      incident post-mortems or trend analysis lose checkpoint cadence, replication-slot
      retention growth, IO breakdown, and JIT cost over time. Roadmap deferred record/report
      as a TUI-first scope cut (ADR [004]); this feature closes that gap.
    gaps: "Confirm relative priority/value framing per screen"
    required: true

  target_users:
    score: 70
    status: "partial"
    value: >
      Practicing PostgreSQL DBAs doing offline troubleshooting and trend analysis from
      recorded archives (same audience as existing `pgcenter report`).
    gaps: ""
    required: false

  success_criteria:
    score: 90
    status: "complete"
    value: >
      `pgcenter record` collects all 5 report types (bgwriter, replslots, stat_io,
      stat_io_time, statements_jit). `pgcenter report` replays each via locked CLI:
      -B/--bgwriter, -L/--replslots, -J/--io c|t, -X j. `pgcenter report -d <flag>`
      prints a description for each. Empty/old archives print header-only (no special
      no-data handling). diff semantics match the TUI (cumulative counters diffed via
      DiffIntvl; absolute/text columns pass through). CI green on PG14-18 matrix.
    gaps: ""
    required: true

  constraints:
    score: 90
    status: "complete"
    value: >
      Pure-SQL views (no procfs/CollectExtra/stateful tarRecorder, unlike procpidstat 003).
      Infra already present: all 5 types in view.Configure() switch (view.go:390-407);
      query.Format resilient to empty Options (plain text/template, no missingkey=error);
      precedent is `replication` recordable via report-time Configure(Options{Version}).
      replslots/stat_io coalesce diffed counters to 0 in the recorded SQL, so stored cells
      are already "0" — diffPair-safe on replay. Must not regress existing recordable views
      or break Test_filterViews/TestNew counts. CI gate must stay green PG14-18.
    gaps: ""
    required: true

  testing_strategy:
    score: 85
    status: "complete"
    value: >
      Unit: invert Test_filterViews per-version counts (NotRecordable views no longer
      dropped); assert describeReport has all 5 entries; assert selectReport maps the new
      flags (-B,-L,-J c|t,-X j). Integration: record→report roundtrip per screen across
      PG14-18 (mirror existing report integration tests). Tech-debt payoff: [007]
      behavioral diff() NULL-cell test for pg_stat_io (in internal/stat/postgres_test.go).
    gaps: "Confirm full debt-payoff scope ([004] report col-index constants too?)"
    required: true

# ============================================================================
# Phase 2: User Experience & Scenarios
# ============================================================================
phase2_user_experience:

  user_stories:
    score: 85
    status: "complete"
    value: >
      US1: As a DBA, I want `pgcenter record` to capture bgwriter/replslots/pg_stat_io/JIT
      stats, so that I can analyze them offline after an incident.
        Scenario: run `pgcenter record -f stats.tar` during an incident window; the tar now
        contains bgwriter.*, replslots.*, stat_io.*, stat_io_time.*, statements_jit.* entries
        alongside the existing ones.
      US2: As a DBA, I want `pgcenter report` to replay each new screen, so that I see the
      same per-interval deltas the TUI showed, but from the archive.
        Scenario: `pgcenter report -f stats.tar -B` prints the bgwriter report;
        `-L` replslots; `-J c` / `-J t` the two pg_stat_io screens; `-X j` the JIT screen.
      US3: As a DBA, I want `pgcenter report -d <flag>` to describe each new report's columns,
      so that I can interpret an unfamiliar screen.
        Scenario: `pgcenter report -d -B` prints the bgwriter column descriptions.
    gaps: ""
    required: true

  acceptance_criteria:
    score: 85
    status: "complete"
    value: >
      AC1: `NotRecordable` removed from bgwriter, replslots, stat_io, stat_io_time,
      statements_jit; `pgcenter record` writes a tar entry per type per tick.
      AC2: report flags work: -B→bgwriter, -L→replslots, -J c→stat_io, -J t→stat_io_time,
      -X j→statements_jit; unknown -J/-X values error like existing ones.
      AC3: `report -d <flag>` prints a description for each of the 5 types (describeReport map).
      AC4: replayed reports show correct diff semantics (cumulative counters diffed; absolute/
      text columns e.g. bgwriter stats_age, replslots wal_status pass through).
      AC5: empty/old archives print header-only, no crash, no spurious INFO.
      AC6: version-aware replay across PG14-18 picks correct layout from meta.version.
      AC7: Test_filterViews per-version counts updated; full make test/lint/vuln green; CI
      PG14-18 green.
      AC8: tech-debt [007] behavioral diff() NULL test added; [004] constants exported/deduped.
    gaps: ""
    required: true

  edge_cases:
    score: 85
    status: "complete"
    value: >
      (1) Remote mode: no gate — pure SQL views, recordable remotely. (2) Old archives
      (pre-feature): no matching tar entries → report prints header-only. (3) PG version
      change mid-archive: existing processData discards prev + re-Configures; version-aware
      bgwriter/stat_io/statements_jit switch layout (Ncols/DiffIntvl/UniqueKey) per
      meta.version automatically. (4) jit without pg_stat_statements: filterViews already
      drops statements_* when pgssSchema=="" → not recorded; report -X j → header-only.
      (5) replslots with zero slots / jit with jit_functions=0: empty result, header-only.
    gaps: ""
    required: true

  error_scenarios:
    score: 85
    status: "complete"
    value: >
      Empty/no-data archive → header-only, no error (decision #2). Version mismatch →
      handled by processData re-Configure. NULL-bearing diffed cells on replay →
      coalesce(...,0) in the recorded SQL means stored cells are "0", not NULL, so
      diffPair/ParseInt is safe (the [005]/[006] coalesce contract carries into recording).
      report-time Configure renders structurally-correct view even with empty Options
      (broken SQL string is never executed in report — only Ncols/DiffIntvl/UniqueKey used).
    gaps: ""
    required: true

  verification_strategy:
    score: 90
    status: "complete"
    value: >
      Test approach LOCKED (variant A + golden output): report-side diff verification via
      GOLDEN files (report_bgwriter.golden, report_replslots.golden, report_stat_io.golden,
      report_stat_io_time.golden, report_statements_jit.golden) — same idiom as existing
      report_*.golden. INPUT is a purpose-built SYNTHETIC in-memory tar (pattern of
      Test_app_doReport_procpidstat: hand-built PGresult x2 ticks + meta entry with target
      version), NOT the legacy pgcenter.stat.golden.tar (it lacks the new entries, is a ~PG13
      recording that can't hold modern views, and regenerating it would churn all 30 existing
      goldens). Version-aware screens (bgwriter, stat_io, statements_jit) get goldens at
      meta.version 14/17/18 to prove layout switching; replslots + stat_io_time (version-
      independent) need one golden each. Record-side covered by existing live Test_app_record
      (auto-counts new recordable views). Unit: Test_filterViews PG14 literals (11/16→9/18,
      5/22→3/24), describeReport 5 entries, selectReport 5 cases, view_test True→False x5.
      User: manual record then report -B/-L/-J c|t/-X j and -d against live PG.
    gaps: ""
    required: true

  ui_ux_requirements:
    score: 85
    status: "complete"
    value: >
      CLI only (no TUI changes). report flags: -B/--bgwriter (bool), -L/--replslots (bool),
      -J/--io (string c|t), -X/--statements extended with value j. `-d <flag>` prints the
      description text. Report output format identical to existing report screens (timestamp
      header, periodic column header every 20 lines, per-interval rate line). Column set and
      headers identical to the corresponding TUI screen. Empty data → header-only, no INFO.
      Describe output mirrors existing pgStat*Description constants in report package.
    gaps: ""
    required: true

  risks:
    score: 85
    status: "complete"
    value: >
      R1 (low): report-time Configure renders broken SQL for replslots (empty WalFunction)
      / jit (empty PGSSSchema) — mitigated: SQL not executed in report, Format won't error,
      only layout fields used. Covered by roundtrip test.
      R2 (low): NULL diffed cells on replay — mitigated: coalesce in recorded SQL stores "0".
      R3 (low): Test_filterViews per-version count drift (version-gated views → different
      deltas per version row) — mitigated by careful per-version update + CI PG14-18 gate.
      R4 (low): CLI short-letter collision — B/L/J verified free.
    gaps: ""
    required: false

  technical_decisions:
    score: 85
    status: "complete"
    value: >
      D1: pure-SQL views need NO recorder changes — only remove NotRecordable (vs
      procpidstat 003 which needed stateful tarRecorder). D2: jit reuses -X statements flag
      (value j), not a new flag — mirrors TUI x-cycle. D3: pg_stat_io uses one string flag
      -J c|t for its two report types — mirrors -X/-D/-P idiom. D4: no remote gate (orthogonal
      to procpidstat's db.Local gate). D5: no special no-data handling — empty=header-only.
      D6: docs updated within feature. D7: pay [007]+[004], defer [006]+[005].
    gaps: ""
    required: false

