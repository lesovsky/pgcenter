conversation_history:
  - question_num: 0
    timestamp: "2026-05-19 17:18:34"
    topic: "buddy_session_context"
    agent_question: |
      Buddy-сессия: обсуждение архитектуры до начала интервью.
    user_answer: |
      Цель: поддержать полный hybrid (19 колонок) для procpidstat в pgcenter record/report.
      Ключевые решения:
      - MVC-разрез buildProcPidResult на raw (числа) + format (display-строки)
      - stateful recorder: хранит prev-состояние между тиками для enrichment
      - sysinfo tar entry для ticks и cpuCount (DDD: отдельный bounded context от PostgreSQL meta)
      - DiffIntvl=[6,11] для accumulated колонок в report
      - Backward compat: readMeta уже проверяет Ncols < 2; sysinfo читается если есть
      - Scope: local-only (существующее ограничение), не ломаем старые tars
      - Важнее "правильно" чем быстро; исправляем MVC-нарушение из фич 001/002
    summary: "Архитектурные решения согласованы в buddy-сессии до начала интервью"

phase1_feature_overview:

  feature_description:
    score: 90
    status: "complete"
    value: |
      Закрываем tech-debt [002]: добавляем поддержку pgcenter record и pgcenter report
      для экрана per-process system stats (Shift+S, procpidstat). Полный hybrid —
      все 19 колонок: SQL-активность + procfs (CPU, IO, iodelay). Local-only.
      Требует MVC-рефакторинга buildProcPidResult и расширения recorder/report.
    gaps: ""
    required: true

  user_problem:
    score: 85
    status: "complete"
    value: |
      DBA не может собрать исторические данные о per-process нагрузке для post-mortem анализа.
      pgcenter top показывает только реальное время. После инцидента нет способа восстановить
      какой бэкенд грузил CPU или IO в момент X. record/report решает это для всех других
      экранов, но не для procpidstat.
    gaps: ""
    required: true

  target_users:
    score: 85
    status: "complete"
    value: "PostgreSQL DBA, использующие pgcenter record для мониторинга и post-mortem анализа"
    gaps: ""
    required: false

  success_criteria:
    score: 88
    status: "complete"
    value: |
      - pgcenter record пишет procpidstat в tar автоматически
      - pgcenter report -N показывает per-interval данные с форматированием (HH:MM:SS, %, KiB/s)
      - Все report форматирующие опции работают с -N
      - TUI (Shift+S) не регрессирует после MVC-рефактора
      - Backward compat со старыми tars
    gaps: ""
    required: true

  constraints:
    score: 90
    status: "complete"
    value: |
      - Local-only: procfs недоступен при remote PostgreSQL (существующее ограничение)
      - Backward compat: старые tars без procpidstat читаются без изменений
      - MVC: исправляем нарушение из 001/002 правильно, а не срезаем угол
      - sysinfo entry пишется только при записи procpidstat
    gaps: ""
    required: true

  testing_strategy:
    score: 88
    status: "complete"
    value: |
      Unit тесты (делаем):
      - buildProcPidResultRaw: корректные числовые значения (jiffies, bytes, ticks)
      - formatProcPidResultForDisplay: корректное форматирование (HH:MM:SS, %, KiB/s)
      - sysinfo write/read round-trip
      - report pipeline для procpidstat: DiffIntvl, rate computation

      Integration: не делаем — procfs недетерминирован в CI, паттерн из 001/002

      E2E: агент запускает record + report с реальным tar, проверяет непустой вывод

      Пользователь проверяет вручную: форматирование, сортировка, regression TUI
    gaps: ""
    required: true

phase2_user_experience:

  user_stories:
    score: 88
    status: "complete"
    value: |
      1. Как DBA, я хочу чтобы pgcenter record автоматически собирал per-process stats вместе
         с остальными view, чтобы не думать о дополнительных флагах при запуске.
      2. Как DBA, я хочу запустить pgcenter report -N после инцидента и увидеть какой backend
         грузил CPU/IO в момент X, чтобы делать post-mortem анализ без дополнительных инструментов.
      3. Как DBA, я хочу использовать -s/-e/-o/-g/-l/-t с -N точно так же как с -A,
         чтобы фильтровать и сортировать записанные per-process данные.
      4. Как DBA, я хочу что pgcenter report -N на старом tar (без procpidstat данных) не падал,
         а выводил понятный INFO, чтобы не гадать что пошло не так.
      Сценарии: см. ниже в спеке
    gaps: ""
    required: true

  acceptance_criteria:
    score: 90
    status: "complete"
    value: |
      Полный чеклист (для самостоятельного прогона агентом):
      - [ ] pgcenter record -f stats.tar записывает procpidstat-данные автоматически
      - [ ] pgcenter report -f stats.tar -N выводит построчный дамп с временными метками
      - [ ] pgcenter report -f stats.tar -d -N выводит describe колонок procpidstat
      - [ ] Колонки %all, read,KiB/s, %iodelay показывают per-interval значения (не накопленные)
      - [ ] Форматирующие опции -s, -e, -o, -g, -l, -t работают с -N (как с -A)
      - [ ] make test && make lint проходят без новых ошибок
      - [ ] Старые tars без procpidstat данных: pgcenter report -N выводит INFO, не падает
      - [ ] Tar без sysinfo entry: report -N выводит INFO о недоступности rate-колонок или
            вычисляет с дефолтными значениями (ticks=100, cpuCount=runtime.NumCPU())
      - [ ] IO-колонки пустые ("") если IO был недоступен при записи: предупреждение при старте report
      - [ ] Regression: TUI (Shift+S) работает как раньше после MVC-рефактора buildProcPidResult
    gaps: ""
    required: true

  edge_cases:
    score: 85
    status: "complete"
    value: |
      - Старые tars без sysinfo: graceful — report вычисляет с дефолтными значениями или выводит INFO
      - IO недоступен при записи: IO-колонки "" в report + предупреждение при старте (как у filterViews INFO)
      - delayacct недоступен при записи: iodelay-колонки "" в report + предупреждение
      - Remote-подключение при записи: recorder проверяет db.Local (isLocalhost() — уже реализовано
        в postgres.Connect()); если false — procpidstat не записывается, INFO при старте
      - Backend завершился между тиками при записи: строка исчезает на следующем снапшоте (как в TUI)
      - Recorder прерван (SIGINT) на полтике: незакрытый tar-entry игнорируется при чтении в report
      - CLK_TCK разный на машине записи и просмотра: sysinfo содержит значение с машины записи → rates корректны
    gaps: ""
    required: true

  error_scenarios:
    score: 85
    status: "complete"
    value: |
      - IO/delayacct недоступны при записи: деградация как в TUI (пустые колонки) + INFO warning в report
      - pgcenter report -N на tar без procpidstat: INFO "no procpidstat data in this archive", пустой вывод
      - Tar с sysinfo но без procpidstat entries: то же что выше
      - Повреждённый tar entry: report пропускает entry (как сейчас для других view)
    gaps: ""
    required: true

  verification_strategy:
    score: 87
    status: "complete"
    value: |
      Агент проверяет (автоматически):
      - make test — все unit тесты (включая новые для buildProcPidResultRaw, formatProcPidResultForDisplay, sysinfo read/write)
      - make lint — нет новых предупреждений
      - make build — бинарник собирается
      - pgcenter record -f /tmp/test.tar -c 3 -i 1s (3 снапшота), затем pgcenter report -f /tmp/test.tar -N
        → вывод непустой, содержит временные метки

      Пользователь проверяет вручную:
      - Запустить pgcenter record на 30 секунд под нагрузкой
      - pgcenter report -f stats.tar -N — вывод не пустой, форматирование корректное
      - pgcenter report -f stats.tar -N -o "%all" — сортировка работает
      - Regression: pgcenter top → Shift+S — экран работает как раньше
    gaps: ""
    required: true

  ui_ux_requirements:
    score: 88
    status: "complete"
    value: |
      pgcenter record:
      - CLI не меняется, procpidstat пишется автоматически вместе со всеми recordable view
      - INFO при старте: "INFO: recording to <file>" (как сейчас)

      pgcenter report -N:
      - Новый boolean флаг --proc-stats / -N: "show per-process system stats report"
      - Все форматирующие опции работают: -s (start), -e (end), -o (order), -g (grep), -l (limit), -t (strlimit)
      - pgcenter report -d -N: describe описывает колонки procpidstat
      - Формат вывода: построчный дамп с временными метками, как activity:
          2026/05/19 10:15:01, rate: 5s
          1234  mydb  postgres  active  ...  15.32  204.80  ...  SELECT ...
      - Колонки: все доступные из raw формата, дубликаты исключаются если есть
      - Пустые IO/iodelay колонки отображаются как "" + WARNING в шапке report
    gaps: ""
    required: true

  risks:
    score: 85
    status: "complete"
    value: |
      - stateful recorder: tarRecorder усложняется (prev maps)
        Митигация: Reset() при каждом открытии новой сессии записи; тест на memory leak не нужен (Go GC)
      - ticks на разных машинах: sysinfo хранит ticks с машины записи → rates корректны при переносе
        Митигация: sysinfo entry обязателен при записи procpidstat; при отсутствии — дефолт 100
      - MVC-рефактор buildProcPidResult: регрессия в TUI
        Митигация: существующие тесты 001/002 остаются зелёными; buildProcPidResultRaw покрывается новыми тестами
      - Scope: рефактор + recorder + report — M-фича с риском расползания
        Митигация: строгий scope, не добавляем ничего сверх описанного
    gaps: ""
    required: true

  technical_decisions:
    score: 90
    status: "complete"
    value: |
      ВЫБРАН Option B (как у activity view):
      - recorder stateful: prev/curr ProcPidStat + ProcPidIO maps в tarRecorder struct fields
      - recorder вызывает buildProcPidResult (полный) → пишет display-строки (19 колонок) в tar
      - DiffIntvl=[0,0] для procpidstat — pass-through в report (rate-колонки уже вычислены при записи)
      - MVC-разрез buildProcPidResult → buildProcPidResultRaw + formatProcPidResultForDisplay:
        выполняется для архитектурной чистоты TUI; recorder использует полный buildProcPidResult как есть
      - sysinfo tar entry: записывает ticks (float64) + cpuCount (int); reader extends metadata struct
      - NotRecordable: true → false (убирается); local-mode guard через db.Local (уже реализован в postgres.Connect)
      - getSysticksLocal() + runtime.NumCPU() вызываются в recorder.setup() через postgres.Connect() db.Local check
      - Первый тик записывается с нулевыми rates; processData() пропускает первый snapshot (existing behavior)
      - Local/remote: db.Local через isLocalhost() — уже реализовано, подключить в recorder.setup()
      - sysinfo в readTar(): metadata struct расширяется (ticks, cpuCount); readTar обрабатывает sysinfo.* как meta.*
    gaps: ""
    required: false

phase3_integration:

  integration_points:
    score: 88
    status: "complete"
    value: |
      Файлы, требующие изменений:
      - internal/stat/procpidstat.go: MVC-разрез buildProcPidResult → buildProcPidResultRaw + formatProcPidResultForDisplay
      - internal/stat/stat.go: Collector.Update() вызывает formatProcPidResultForDisplay (вместо buildProcPidResult)
      - internal/view/view.go: NotRecordable: false, DiffIntvl: [0,0] остаётся (как у activity)
      - record/recorder.go: tarRecorder становится stateful (prev/curr maps + ticks + cpuCount);
        collect() вызывает procfs enrichment для procpidstat; write() пишет sysinfo entry
      - record/record.go: убрать NotRecordable guard для procpidstat; добавить local-mode check
        (при remote-подключении procpidstat не записывается — PIDs удалённой машины недоступны через /proc)
      - report/report.go: readTar() обрабатывает sysinfo.* entry; metadata struct расширяется (ticks, cpuCount);
        describeReport() добавляет "procpidstat" entry
      - cmd/report/report.go: новый флаг -N (showProcPidStat bool), ветка в selectReport()
      - record/record_test.go: TestFilterViews_NotRecordable инвертируется; счётчики сдвигаются на 1
      - report/testdata/: добавить procpidstat + sysinfo entries в golden tar

      Паттерн DiffIntvl=[0,0]: recorder вычисляет rates при записи (stateful с prev/curr maps),
      report делает pass-through — аналогично activity view. MVC-разрез нужен для архитектурной
      чистоты, не является строго необходимым для функциональности.
    gaps: ""
    required: true

  dependencies:
    score: 85
    status: "complete"
    value: |
      - getSysticksLocal() в internal/stat/stat.go (уже есть)
      - runtime.NumCPU() стандартная библиотека
      - buildProcPidResult, ProcPidStat, ProcPidIO, CheckIOAvailable, CheckDelayAcctAvailable (уже есть)
      - stat.Compare() для DiffIntvl (уже есть)
    gaps: ""
    required: false

  data_requirements:
    score: 70
    status: "partial"
    value: |
      - Raw PGresult: 13 колонок (labels + raw jiffies/bytes/ticks + query)
      - sysinfo entry: JSON с sys_ticks (float64) и num_cpu (int)
    gaps: "Точная схема 13-колоночного raw PGresult. DiffIntvl=[6,11] — правильно ли? 13 колонок, индексы 6-11 это что?"
    required: false

  migration_needs:
    score: 90
    status: "complete"
    value: "Нет миграции: старые tars читаются без изменений, новые tars читаются новым report. Backward compat обеспечен."
    gaps: ""
    required: false

