phase1_feature_overview:
  feature_description:
    score: 85
    status: "complete"
    value: >
      New 7th pg_stat_statements sub-screen under the X menu showing JIT compilation
      metrics per (user, database, queryid): jit_functions, generation/inlining/
      optimization/emission counts+times (PG15+); PG17 adds deform_count/deform_time.
      Built by analogy with statements_io. TUI-only, NotRecordable. Closes release 0.11.0.
    gaps: ""
    required: true
  user_problem:
    score: 80
    status: "complete"
    value: >
      No way in pgcenter to see JIT compilation cost per query. With jit=on (default),
      JIT overhead can dominate planning/execution for short queries; a DBA needs to spot
      which normalized statements pay heavy generation/optimization/emission time.
    gaps: ""
    required: true
  target_users:
    score: 80
    status: "complete"
    value: "Practicing PostgreSQL DBA troubleshooting query latency / JIT overhead."
    required: false
  success_criteria:
    score: 60
    status: "partial"
    value: "JIT sub-screen reachable via X menu and x-cycle; correct columns per PG version; CI green PG14-18."
    gaps: "Confirm exact acceptance criteria and zero-JIT row handling"
    required: true
  constraints:
    score: 85
    status: "complete"
    value: >
      PG15+ feature (view absent <15). TUI-only, NotRecordable. pgss extension required.
      Single query per version (PG15/16 base, PG17+ adds deform_*). Synthetic md5 queryid
      UniqueKey -> columns cannot be hidden, must use per-version column set.
    gaps: ""
    required: true
  testing_strategy:
    score: 70
    status: "partial"
    value: >
      S feature. Unit: SelectStatStatementsJITQuery version branching (query_test.go pattern).
      Fix the two count-tests broken by adding a view (view_test.go::TestNew,
      record/record_test.go::Test_filterViews). Full PG14-18 gate in CI.
    gaps: "Confirm whether config_view/menu need tests"
    required: true

