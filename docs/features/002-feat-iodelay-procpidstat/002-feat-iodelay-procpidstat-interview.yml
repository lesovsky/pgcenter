  - question_num: 3
    timestamp: "2026-05-19 00:05:00"
    topic: "ui_ux / column position"
    agent_question: "iodelay_total после write_total; %iodelay после write,KiB/s перед query"
    user_answer: "да, именно так"
    summary: "iodelay_total в группе accumulated (col 11), %iodelay в группе rate (col 17)"

  - question_num: 4
    timestamp: "2026-05-19 00:05:00"
    topic: "testing_strategy"
    agent_question: "Только unit-тесты, без integration?"
    user_answer: "согласен"
