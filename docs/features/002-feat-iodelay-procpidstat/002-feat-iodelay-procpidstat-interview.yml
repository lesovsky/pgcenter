    topic: "edge_cases"
    agent_question: "Первый тик: %iodelay=''? PID исчез: как CPU? Re-probe не нужен?"
    user_answer: "по всем моментам ок, ре-проб не нужен"
    summary: "Первый тик %iodelay='', PID исчез → как CPU, probe один раз при Shift+S"

  - question_num: 7
    timestamp: "2026-05-19 00:15:00"
    topic: "verification_strategy"
    agent_question: "make build+test+lint + ручной тест с sysctl=1 и sysctl=0?"
    user_answer: "ок"
