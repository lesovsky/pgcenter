    topic: "acceptance_criteria"
    agent_question: |
      Предложенный список из 9 критериев:
      1) 19 колонок  2) HH:MM:SS  3) %2f  4) sysctl=0→''+warning  5) sysctl=1→значения
      6) первый тик %iodelay=''  7) не нормализуется на cpuCount  8) make test/lint/vuln  9) techdebt resolved
    user_answer: "ок"
    summary: "Все 9 критериев подтверждены"

  - question_num: 9
    timestamp: "2026-05-19 00:25:00"
    topic: "error_scenarios"
    agent_question: "sysctl=1 но CONFIG_TASK_DELAY_ACCT=n: файл отсутствует → probe=false → '' автоматически?"
    user_answer: "да"
    summary: "Probe через sysctl покрывает все случаи, включая отсутствующий файл"

phase1_feature_overview:

  feature_description:
    score: 95
    status: "complete"
    value: |
      Добавить в S-скрин (Shift+S) две колонки из /proc/[pid]/stat поле 42:
      - iodelay_total,s — накопленное IO-ожидание (HH:MM:SS)
      - %iodelay — доля времени в ожидании блочного IO между тиками (%)
      При kernel.task_delayacct=0: '' + предупреждение в cmdline. Итого 19 колонок.
    gaps: ""
    required: true

  user_problem:
    score: 90
    status: "complete"
    value: |
      DBA не может отличить backend, читающий через page cache, от реально ждущего диска.
      iodelay показывает процент и накопленное время блокировки в D-state.
    gaps: ""
    required: true

  target_users:
    score: 90
    status: "complete"
    value: "PostgreSQL DBA, мониторящие Postgres локально на Linux."
    gaps: ""
    required: false

  success_criteria:
    score: 90
    status: "complete"
    value: |
      19 колонок в S-скрин; HH:MM:SS и % работают корректно;
      graceful fallback при недоступном delay acct; make test/lint/vuln зелёные.
    gaps: ""
    required: true

  constraints:
    score: 90
    status: "complete"
    value: |
      Только Linux, local mode. Probe: /proc/sys/kernel/task_delayacct (один раз при Shift+S).
      %iodelay НЕ нормализуется на cpuCount. %iodelay НЕ входит в %all.
      Warning при delayacct=false конфликтует с IO warning — приоритизация в tech-spec.
    gaps: ""
    required: true

  testing_strategy:
    score: 90
    status: "complete"
    value: |
      Unit-тесты: parser (golden file suffix[39]!=0), buildProcPidResult 19 cols,
      CheckDelayAcctAvailable, DelayAvailable/Unavailable cases. Без integration/E2E.
    gaps: ""
    required: true

phase2_user_experience:

  user_stories:
    score: 90
    status: "complete"
    value: |
      Story 1 (диагностика IO-bound backend):
      1. DBA видит медленный запрос → Shift+S
      2. Видит %iodelay=72%, iodelay_total=00:04:12 vs %all=3%
      3. Вывод: IO-bound, смотреть дисковую подсистему

      Story 2 (недоступный delay acct):
      1. DBA открывает Shift+S, task_delayacct=0
      2. Warning в cmdline + '' в обеих iodelay-колонках
      3. IO-колонки работают нормально
    gaps: ""
    required: true

  acceptance_criteria:
    score: 90
    status: "complete"
    value: |
      1. S-скрин показывает 19 колонок (было 17)
      2. iodelay_total,s: HH:MM:SS для каждого backend
      3. %iodelay: процент с 2 знаками после запятой
      4. kernel.task_delayacct=0: '' + warning в cmdline
      5. kernel.task_delayacct=1: реальные значения из /proc/[pid]/stat
      6. Первый тик: iodelay_total,s = accumulated, %iodelay = ''
      7. %iodelay не нормализуется на cpuCount
      8. make test && make lint && make vuln — зелёные
      9. Tech debt [001] помечен resolved в docs/tech-debt.md
    gaps: ""
    required: true

  edge_cases:
    score: 90
    status: "complete"
    value: |
      - Первый тик: iodelay_total,s=accumulated, %iodelay=''
      - PID исчез между тиками: '' / 0:00:00 (как CPU-колонки)
      - Runtime toggle sysctl: не re-probe, данные до следующего Shift+S могут быть неактуальны
      - /proc/[pid]/stat < 40 полей: IODelay=0, без паники
    gaps: ""
    required: true

  error_scenarios:
    score: 87
    status: "complete"
    value: |
      - /proc/sys/kernel/task_delayacct отсутствует (нет CONFIG_TASK_DELAY_ACCT): probe=false → ''
      - sysctl=1 но поле всегда 0 (ядро без поддержки): покрывается probe=false автоматически
      - /proc/[pid]/stat слишком короткий: IODelay=0, graceful
    gaps: ""
    required: true

  verification_strategy:
    score: 90
    status: "complete"
    value: |
      Авто: make build && make test && make lint && make vuln
      Ручной +: sysctl -w kernel.task_delayacct=1 → Shift+S → IO-нагружающий запрос → %iodelay>0
      Ручной -: sysctl -w kernel.task_delayacct=0 → '' + warning
    gaps: ""
    required: true

  ui_ux_requirements:
    score: 90
    status: "complete"
    value: |
      19 колонок: pid, datname, usename, state, wait_etype, wait_event,
      all_total,s, us_total,s, sy_total,s, read_total,KiB, write_total,KiB, iodelay_total,s,
      %all, %us, %sy, read,KiB/s, write,KiB/s, %iodelay, query

      delayAcctAvailable=false: iodelay_total,s='', %iodelay='', warning в cmdline
      delayAcctAvailable=true, первый тик: iodelay_total,s=HH:MM:SS, %iodelay=''
    gaps: ""
    required: true

  risks:
    score: 85
    status: "complete"
    value: |
      - Ncols 17→19: panic в align.SetAlign при расхождении (проверяется тестом)
      - printCmdline mutual exclusion: IO+delayacct warning нельзя одновременно (tech-spec)
      - dev-машина: task_delayacct=0, нужен sysctl для ручного теста
    gaps: ""
    required: true

  technical_decisions:
    score: 90
    status: "complete"
    value: |
      /proc/[pid]/stat field 42 вместо Netlink (Netlink: крупный scope, новая dep).
      Probe: /proc/sys/kernel/task_delayacct (без PID, без root, runtime state).
      %iodelay не нормализуется на cpuCount. formatCPUTime переиспользуется.
      IODelay в ProcPidStat — те же prevProcPidStats maps, без новых структур.
    gaps: ""
    required: false

