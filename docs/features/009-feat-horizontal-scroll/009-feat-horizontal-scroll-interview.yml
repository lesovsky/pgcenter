notes: |
  Дизайн согласован в обсуждении ДО запуска spec-writer (память: issue_14_horizontal_scroll.md).
  Интервью сжатое и сфокусированное на ранее нерешённых вопросах. Все required-поля >= 85%.

  Devil's advocate (dev-customer) вердикт: ok, 0 critical, 4 minor (все про документирование):
  добавить в user-spec "почему сейчас", зафиксировать заморозку/маркеры как необходимый минимум,
  обосновать скролл против выбора колонок, явно отметить extra-панели вне scope. Учтено в spec.

  ПРОДУКТОВЫЙ ПРИНЦИП (решено с пользователем 2026-06-23): разбиение pg_stat_io/pgss на под-экраны
  и io_key=md5 — ЗАДУМАННЫЙ дизайн (логическая группировка/изоляция связанных данных), НЕ техдолг.
  Скролл нужен для узких терминалов, НЕ для отмены под-экранов. Под-экраны остаются как есть,
  без обязательств по пересмотру. Закрывает главный вопрос devil's advocate.

  Валидация user-spec: оба валидатора approved, 0 critical. Применённые правки: убраны имена
  функций реализации из user-spec, добавлены 2 критерия приёмки (col0=сортировка, пустой результат).

  ВХОД ДЛЯ TECH-SPEC (из adequacy/code research, требует решения на этапе tech-spec):
  - Где хранить scroll offset: на view.View или в config/app. Ловушка: при хранении на view.View
    viewSwitchHandler пишет view обратно в config.views — без явного зануления offset переживёт
    переключение. Нужно сбросить offset в 0 на ОБОИХ путях переключения: viewSwitchHandler И
    switchViewToProcPidStat (он обходит viewSwitchHandler, патчит view вручную). Покрыть тестом.
  - Коллизия bold-подсветки заморозки и bold-подсветки колонки сортировки (\033[47;1m) на col0 —
    нужно правило приоритета/комбинации.
  - Маркеры ‹/› — видимые руны, входят в бюджет ширины заголовка (риск off-by-one).
