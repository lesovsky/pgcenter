# ============================================================================
# Notes
# ============================================================================
notes: |
  - Feature 005 in the 0.11.0 roadmap; follows 004 (bgwriter) patterns directly.
  - KEY scope resolution: roadmap named the feature pg_stat_replication_slots but framed the
    value as disk-fill/retained-WAL — those live in DIFFERENT views. Resolved to hybrid
    (Variant B): pg_replication_slots LEFT JOIN pg_stat_replication_slots, covering all
    slots (physical+logical) + retained WAL. Pure Variant A would not deliver the value.
  - CRITICAL correctness item (verified in postgres.go:316-345): physical slots match
    themselves across samples and enter the diff branch; NULL counters -> diffPair("")
    -> ParseInt error -> sample breaks. MUST coalesce the 8 diffed counters to 0.
    Consequence: physical slots display 0 (not empty) for spill/stream/total.
  - Recovery-aware retained WAL is free via existing WalFunction template — no recovery
    branch needed.
  - No per-version branching: chosen pg_replication_slots subset (slot_name, slot_type,
    active, wal_status, restart_lsn, safe_wal_size) is stable PG 14-18. conflicting (PG16)
    / invalidation_reason (PG18) deliberately excluded to avoid branching; wal_status
    carries the invalidation signal. Documented limitation.
  - Default sort deviates from the col-0 convention: retained,KiB desc (incident-first).
  - pg_stat_subscription_stats deferred to a separate feature.
  - Tests: tier 2 (physical slot, no image change) + tier 3 (logical slot, image bump
    0.0.9->0.0.10 with wal_level=logical + test_decoding). Both confirmed in scope.
  - Test_filterViews wantN must be bumped +1 per row (same miss as bgwriter commit 435f54c).

  DEVIL'S ADVOCATE (dev-customer) resolutions:
  - [Major] 15-column width: KEEP all 15 (user decision). Precedent: replication is already
    15 (Default)/17 (Extended) columns. Mitigation: incident-critical columns on the LEFT
    (slot_name, slot_type, active, wal_status, retained) so terminal-edge clipping drops the
    least-important columns (total_*, stats_age) first.
  - [Major] physical slots show "0" not empty: ACCEPTED + documented trade-off. "-"/empty
    rendering would need new per-cell rendering code (not in pgcenter) = scope creep.
    Mitigation: adjacent slot_type column disambiguates "0" as N/A vs no-activity.
  - [Major] NotRecordable kills retrospective analysis: ACKNOWLEDGED limitation, kept for
    0.11.0 (roadmap TUI-first). Documented explicitly in spec Limitations. Follow-up:
    record/report for the new top-views (incl. replslots) is the planned next phase after
    all 0.11.0 top-views land.
  - [Minor] default sort deviation (retained desc vs col 0): documented in technical_decisions.
  - [Minor] no invalidation_reason/conflicting: documented limitation (PG18 users go to psql
    for the cause); accepted to avoid version branching.
  COMPLETENESS CHECKER: complete (high confidence); its two minors == the width and "0"
  trade-offs above, both resolved.
