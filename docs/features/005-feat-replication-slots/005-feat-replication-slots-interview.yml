# ============================================================================
# Phase 1: High-Level Feature Understanding
# ============================================================================
# Interview Cycle 1 scope
phase1_feature_overview:

  feature_description:
    score: 95
    status: "complete"
    value: |
      New multi-row TUI screen 'replslots' (hotkey 'o') in pgcenter top showing one row
      per replication slot. HYBRID source (Variant B, confirmed): pg_replication_slots
      LEFT JOIN pg_stat_replication_slots ON slot_name. Covers ALL slots (physical +
      logical). State columns (slot_type, active, wal_status, retained WAL, safe_wal_size)
      shown absolute; spill/stream cumulative counters shown diffed (empty for physical
      slots). Modeled on existing multi-row version-aware views (replication/tables) for
      OrderKey + Filters. TUI-only in 0.11.0 (NotRecordable), like bgwriter (004).
    gaps: ""
    required: true

  user_problem:
    score: 90
    status: "complete"
    value: |
      Slot retention / WAL spill is a frequent disk-fill incident, especially with logical
      decoding and disconnected standbys. pgcenter currently shows nothing about slots.
      DBA must drop to psql to see which slot holds back WAL (restart_lsn), how much WAL is
      retained, slot wal_status (reserved/extended/unreserved/lost), and logical-decoding
      spill/stream pressure. Pure pg_stat_replication_slots (Variant A) would NOT solve
      this — retained WAL lives in pg_replication_slots and physical slots are absent from
      pg_stat_replication_slots. Hence hybrid.
    gaps: ""
    required: true

  target_users:
    score: 90
    status: "complete"
    value: |
      Practicing PostgreSQL DBA doing daily ops / incident response — same audience as the
      rest of 0.11.0. Primary scenario: disk filling up, find the offending slot.
    gaps: ""
    required: false

  success_criteria:
    score: 80
    status: "partial"
    value: |
      Hotkey 'o' opens replslots screen from any other top screen. One row per slot (all
      types). Retained WAL and wal_status visible. Physical + logical slots both render.
      spill/stream diffed, state absolute. Query runs on PG 14-18. NotRecordable. 'o' in
      help. Exact column set + per-version branching decided in Cycle 2.
    gaps: "Exact acceptance column list pending Cycle 2 (column set + PG16/18 conflicting/invalidation)"
    required: true

  constraints:
    score: 80
    status: "partial"
    value: |
      - TUI-only in 0.11.0 (NotRecordable: true) — record/report deferred to backlog,
        same as bgwriter 004.
      - MinRequiredVersion PG 14 (pg_stat_replication_slots introduced PG 14; older
        versions filtered out by pgcenter's standard mechanism).
      - Query readable by any role without special privileges; works over any connection
        incl. PgBouncer (simple protocol).
      - pg_stat_subscription_stats is OUT of scope — deferred to a separate feature.
      - retained WAL = pg_current_wal_lsn() - restart_lsn on a primary; on a standby use
        pg_last_wal_receive_lsn() — must handle recovery mode (decide in Cycle 2).
    gaps: "Recovery-mode LSN function choice; exact column subset"
    required: true

  testing_strategy:
    score: 90
    status: "complete"
    value: |
      Unit tests on the query selector (Ncols/DiffIntvl) per PG version — pattern from
      wal_test.go / bgwriter_test.go. Integration on live PG 14-18 containers with REAL
      fake slots:
      - tier 2 (physical slot via pg_create_physical_replication_slot(name,true)) —
        exercises retained WAL / wal_status / slot_type=physical without image change.
      - tier 3 (CONFIRMED): logical slot via pg_create_logical_replication_slot(name,
        'test_decoding') — exercises the pg_stat_replication_slots half + LEFT JOIN.
        Requires pgcenter-testing image bump 0.0.9->0.0.10: add wal_level=logical to
        testing/prepare-test-environment.sh and ensure test_decoding plugin present.
        spill/stream counters asserted present (values may be 0 — shape, not magnitude).
      Tests create slots in setup, drop via defer in teardown. E2E: none (no user flow
      beyond opening the screen). Size: M.
    gaps: ""
    required: true

# ============================================================================
# Phase 2: User Experience & Scenarios
# ============================================================================
# Interview Cycle 2 scope (together with Phase 3)
phase2_user_experience:

  user_stories:
    score: 90
    status: "complete"
    value: |
      1. As a DBA with a filling disk, I want to see which slot retains the most WAL
         (retained,KiB + active), to find the culprit — often a disconnected standby
         (active=false).
      2. As a DBA, I want to see wal_status, to catch a slot in lost/unreserved before an
         outage.
      3. As a DBA using logical replication, I want to see spill/stream (decoding spilled
         to disk and streamed), to gauge decoding pressure and tune
         logical_decoding_work_mem.
      4. As a DBA, I want physical and logical slots on one screen, to avoid hopping
         between views.
    gaps: ""
    required: true

  acceptance_criteria:
    score: 85
    status: "complete"
    value: |
      - Hotkey 'o' opens replslots from any other top screen.
      - One row per slot (physical + logical), 15 columns PG 14-18 (single query, no
        version branch).
      - Columns: slot_name, slot_type, active, wal_status, retained,KiB, safe,KiB
        (absolute); spill_txns, spill_count, spill,KiB, stream_txns, stream_count,
        stream,KiB, total_txns, total,KiB (diffed); stats_age (absolute, last).
      - Default sort: retained,KiB descending (OrderKey=4, OrderDesc=true). Sortable
        (arrows) and filterable (/) like other multi-row views.
      - Physical slots: 0 in the 8 diffed counters, empty safe/stats_age; logical slots:
        real values.
      - retained,KiB recovery-aware (primary vs standby) via existing WalFunction template.
      - NotRecordable: pgcenter record skips it, report unaffected.
      - 'o' added to help (?).
      - Unit tests assert query/Ncols/DiffIntvl PG 14-18; integration runs on live PG
        14-18 with physical (tier 2) and logical (tier 3) slots.
    gaps: ""
    required: true

  edge_cases:
    score: 88
    status: "complete"
    value: |
      - No slots configured -> empty screen (header only), like pg_stat_replication with
        no standby. No special message.
      - Physical slot in pg_replication_slots but absent from pg_stat_replication_slots
        (LEFT JOIN) -> 8 counters NULL; MUST coalesce->0 or diffPair("","") errors and
        breaks the sample (verified in postgres.go:316-345). Coalesce->0 => physical rows
        show 0.
      - restart_lsn NULL (physical slot without reserved WAL) -> retained,KiB empty
        (absolute, outside DiffIntvl, no crash).
      - safe_wal_size NULL (max_slot_wal_keep_size=-1, the default) -> safe,KiB empty.
      - stats_reset NULL -> stats_age empty (physical slots always; fresh logical slots).
      - Slot appears/disappears/reorders between samples -> diff matches by UniqueKey=0
        (slot_name); new slot shows raw counters for one interval, dropped slot vanishes
        (same as replication view).
      - Standby: pg_replication_slots shows only slots existing on that standby
        (cascading/failover-synced) — correct PG behavior.
    gaps: ""
    required: true

  error_scenarios:
    score: 85
    status: "complete"
    value: |
      - External pg_stat_reset_replication_slot / slot drop during a tick -> a diffed
        counter may show one negative/raw interval; existing pgcenter behavior (same as
        wal/bgwriter), not fixed here.
      - Empty-string NULL entering the diff block -> prevented by coalesce->0 (the one
        real correctness risk; mandatory, not optional).
      - Both views are world-readable; no permission-denied path. Works over PgBouncer
        (simple protocol). No new error UI.
    gaps: ""
    required: true

  verification_strategy:
    score: 88
    status: "complete"
    value: |
      Agent: make test (unit selector + integration tier1/2/3), make build, make lint,
      make vuln. Integration asserts len(FieldDescriptions)==Ncols on PG 14-18 and that a
      created physical slot yields a non-NULL retained value, a created logical slot yields
      a row with the spill/stream columns present.
      User: open pgcenter top on a primary with a physical slot (e.g. inactive) and on a
      logical-replication setup; press 'o'; confirm retained sort, physical-shows-0,
      wal_status, and 'o' in help.
    gaps: ""
    required: true

  ui_ux_requirements:
    score: 90
    status: "complete"
    value: |
      Screen 'replslots' (hotkey 'o') in the top stats area — multi-row, modeled on the
      replication/tables screens. Header row + one data row per slot. 15 columns (layout
      above). Default sort retained,KiB desc. Standard multi-row controls: arrow keys move
      OrderKey, '/' opens per-column regexp filter, Ncols=15 is the OrderKey right border.
      No new dialogs/forms/components. Column set is version-independent (no per-version
      surprise on upgrade). Help screen (?) mode line gains 'o' replication slots. Empty
      state = header-only screen.
    gaps: ""
    required: true

  risks:
    score: 88
    status: "complete"
    value: |
      - R1: physical-slot NULL counters break diff. Mitigation: coalesce->0 (mandatory,
        verified in code). HIGH-impact, fully mitigated.
      - R2: 15 columns may be wide on small terminals. Mitigation: ColsWidth + standard
        pgcenter horizontal handling; acceptable per replication precedent.
      - R3: invalidation cause not shown (wal_status only). Mitigation: documented
        limitation; invalidation_reason deferrable as a PG18 branch later.
      - R4: Test_filterViews CI assertion must be bumped (+1 wantN per row) — same miss as
        bgwriter. Mitigation: bump in the same change.
      - R5: tier-2 physical slot retains WAL on shared fixture. Mitigation: drop slot in
        teardown (defer).
    gaps: ""
    required: true

  technical_decisions:
    score: 90
    status: "complete"
    value: |
      - Hybrid pg_replication_slots LEFT JOIN pg_stat_replication_slots ON slot_name (B),
        not pure pg_stat_replication_slots — needed for retained WAL + physical slots.
      - State absolute (outside DiffIntvl), 8 logical counters diffed (inside contiguous
        DiffIntvl=[6,13]); follows ADR-004 placement.
      - coalesce(counter,0) on the 8 diffed columns — diff-safety for physical slots.
      - Single query for PG 14-18 (stable subset), selector still version-keyed for
        symmetry/future branches. No conflicting/invalidation_reason.
      - retained WAL via {{.WalFunction1}}({{.WalFunction2}}(),restart_lsn) — recovery-aware
        for free.
      - Default sort retained,KiB desc (incident-first) — deviates from the col-0 default
        of other views, justified by the disk-fill use case.
      - NotRecordable: true (TUI-only in 0.11.0); record/report deferred to backlog.
      - slot_name at col 0 = UniqueKey for row-identity in diffing.
    gaps: ""
    required: false

