# ============================================================================
# Phase 1: High-Level Feature Understanding
# ============================================================================
# Interview Cycle 1 scope
phase1_feature_overview:

  feature_description:
    score: 90
    status: "complete"
    value: |
      New TUI screen for pg_stat_io (PG16+). Multi-row table (one row per
      backend_type x object x context), cumulative counters shown as per-interval
      rates. Split into TWO sub-screens to fit terminal width (pgcenter has no
      horizontal scroll): count-based (operation counts + bytes throughput) and
      time-based (read/write/writeback/extend/fsync timings). Base columns on both:
      backend_type, object, context, stats_age. Rows where all count counters are
      NULL/0 are hidden. Version-dependent queries (PG18 added native *_bytes fields
      and WAL IO). Modeled on replslots (multi-row) + pgss (sub-screen menu).
    gaps: ""
    required: true

  user_problem:
    score: 85
    status: "complete"
    value: |
      No way today in pgcenter to see the unified IO breakdown by
      backend_type x object x context. During incidents a DBA cannot tell whether
      heavy IO comes from vacuum vs client backends vs checkpointer, or via which
      context (normal/vacuum/bulkread/bulkwrite). PG18 also moved WAL IO timings
      out of pg_stat_wal into pg_stat_io — currently invisible. bgwriter screen
      already had to drop buffers_backend on PG17+ because the data moved here.
    gaps: ""
    required: true

  target_users:
    score: 85
    status: "complete"
    value: "Practicing PostgreSQL DBA doing incident triage / routine IO monitoring."
    gaps: ""
    required: false

  success_criteria:
    score: 90
    status: "complete"
    value: |
      - Hotkey j opens pg_stat_io; toggles count<->time. J opens a 2-item menu.
      - Both screens show correct per-interval rates for all non-empty rows.
      - Rows with all-NULL count counters hidden; same row-set on both screens.
      - Correct version branching PG16/17 vs PG18 (native *_bytes, WAL object).
      - PG14/15: clear "not supported on this version" message, no crash.
      - track_io_timing=off handled gracefully (time-screen may be mostly zero).
    gaps: ""
    required: true

  constraints:
    score: 90
    status: "complete"
    value: |
      - TUI (top) only; view NotRecordable:true (release 0.11.0 TUI-first principle;
        record/report deferred).
      - pg_stat_io is PG16+; pgcenter supports PG14-18.
      - pgcenter has NO horizontal column scroll => wide view must be split into
        sub-screens (this is why pgss is split; same forces apply here).
      - Cumulative counters fit pgcenter rate model; stats_age absolute (not diffed),
        like wal/bgwriter.
    gaps: ""
    required: true

  testing_strategy:
    score: 85
    status: "complete"
    value: |
      Same as bgwriter/replslots: unit tests for the query selector on each version
      branch (PG16/17 vs PG18) + integration tests on live clusters across the CI
      matrix (PG14-18). Locally only PG17 is up -> other versions use t.Skipf;
      full gate (incl. PG18 native bytes + WAL IO) runs in CI.
    gaps: ""
    required: true

# ============================================================================
# Phase 2: User Experience & Scenarios
# ============================================================================
# Interview Cycle 2 scope (together with Phase 3)
phase2_user_experience:

  user_stories:
    score: 88
    status: "complete"
    value: |
      US1 (count): As a DBA during an IO spike, I want reads/writes broken down by
      backend_type x context, so I can distinguish vacuum-driven vs client-driven IO.
        Flow: press j -> count-screen -> sort by reads (default) -> read io_key dims
        -> filter `/` on backend_type or context to isolate (e.g. autovacuum worker).
      US2 (count, PG18): As a DBA on PG18, I want WAL IO (object='wal') visibility
      since it left pg_stat_wal, so I can watch WAL write/fsync pressure.
        Flow: count-screen -> `/` filter object=wal -> watch write,KiB / fsyncs rows.
      US3 (count): As a DBA, I want to spot high evictions/reuses, so I can judge
      shared_buffers adequacy / ring-buffer churn.
        Flow: count-screen -> sort by evictions -> inspect top rows.
      US4 (time): As a DBA with track_io_timing=on, I want read/write/fsync latency
      per source, so I can find slow IO paths.
        Flow: press j again (toggle) -> time-screen -> sort by read_time/fsync_time.
    gaps: ""
    required: true

  acceptance_criteria:
    score: 90
    status: "complete"
    value: |
      AC1: j opens count-screen; repeat j toggles count<->time; J opens a 2-item menu.
      AC2: both screens show correct per-interval rates for all non-empty rows;
           counters diffed, dims + stats_age absolute.
      AC3: rows where all count counters NULL/0 are hidden (SQL WHERE); identical
           row-set on both screens.
      AC4: PG16/17 bytes = reads*op_bytes/1024 etc.; PG18 native *_bytes/1024 +
           object='wal' rows present; per-branch Ncols/DiffIntvl correct (unit tests).
      AC5: PG14/15 -> generic "not supported" message, no panic / no blank screen.
      AC6: track_io_timing=off -> time-screen shows zeros (rows NOT hidden), no error.
      AC7: cross-sample row-matching via synthetic io_key -> correct deltas when >=2
           rows share a backend_type.
      AC8: when all timing columns are zero (track_io_timing=off), time-screen shows a
           cmdline hint "track_io_timing is off — timings unavailable".
      AC9: help screen (h/F1) documents that Q does NOT reset pg_stat_io (shared stats).
    gaps: ""
    required: true

  edge_cases:
    score: 88
    status: "complete"
    value: |
      - NULL in diffed cols (fsyncs for temp relation, reads for background writer)
        -> coalesce(...,0), else sample aborts.
      - Standby: pg_stat_io populated (backend_type='startup'); no special handling.
      - Q (reset) does NOT reset pg_stat_io (shared stats) -> document, not a bug.
      - Narrow terminal -> trailing columns clip (standard pgcenter behavior).
      - PG18 context='init' (WAL segment init) appears as extra rows -> handled by
        generic row rendering (no special-case).
      - track_io_timing=off -> time-screen all zeros: show cmdline hint (AC8), don't
        treat as error, don't hide rows.
    gaps: ""
    required: true

  error_scenarios:
    score: 88
    status: "complete"
    value: |
      - pg_stat_io unavailable (PG<16) -> existing MinRequiredVersion gate ->
        "ERROR: selected statistics is not supported by current version of Postgres".
      - One NULL inside DiffIntvl without coalesce -> blank screen (the main risk;
        closed by coalesce on all diffed cols + a NULL-row unit test).
    gaps: ""
    required: true

  verification_strategy:
    score: 88
    status: "complete"
    value: |
      - Unit: io_test.go selector over versions {14,15,16,17,18}, assert
        (Ncols, DiffIntvl) per branch; include a NULL-row diff-safety test.
      - Integration: live query on CI matrix PG14-18; PG18 run is the real gate for
        native *_bytes + object='wal'. Local PG17 only; others t.Skipf.
      - Manual QA: make build, walk US1-US4 on live PG17 (and PG18 if up). Also
        sanity-check hybrid bytes magnitude on PG17 (reads*op_bytes) vs PG18 (native
        read_bytes) under comparable load — exact divergence from io_combine_limit is
        expected, not a bug.
    gaps: ""
    required: true

  ui_ux_requirements:
    score: 90
    status: "complete"
    value: |
      Two sub-screens of one logical pg_stat_io view. FINAL column layouts:
      count-screen (~16 cols, ~165 wide; default on entry):
        [0] io_key (synthetic md5(backend_type||object||context), UniqueKey, HIDDEN via
            ColsWidth[0]=0 — service key only), [1] backend_type, [2] object,
            [3] context  -- absolute
        [4..14] DIFFED counters: reads, read,KiB, writes, write,KiB, extends, ext,KiB,
            writebacks, hits, evictions, reuses, fsyncs   (DiffIntvl=[4,14])
        [15] stats_age -- absolute, outside diff.
        bytes cols (read,KiB/write,KiB/ext,KiB) hybrid: reads*op_bytes/1024 pre-18,
        native *_bytes/1024 on PG18.
      time-screen (~10 cols):
        [0] io_key, [1] backend_type, [2] object, [3] context  -- absolute
        [4..8] DIFFED: read_time, write_time, writeback_time, extend_time, fsync_time
            (DiffIntvl=[4,8]); [9] stats_age.
      UniqueKey=0 (io_key) both screens. OrderKey=4 (reads / read_time), OrderDesc=true.
      3 separate dims chosen over single concat so per-column `/` filter stays useful
      (~30 rows). Navigation: j = switchViewTo "statio" + statioNextView 2-way toggle;
      J = menuOpen(menuStatIO) 2 items. Hide all-NULL count rows in SQL (WHERE
      sum(counts)>0), same row-set both screens. Edge states: PG14/15 -> generic
      "not supported" via MinRequiredVersion=160000; track_io_timing=off -> time-screen
      zeros (not hidden). Width <165 -> trailing cols clip (standard pgcenter behavior).
    gaps: ""
    required: true
    required: true

  risks:
    score: 90
    status: "complete"
    value: |
      R1 (high): NULL inside DiffIntvl aborts the sample (blank screen). Mitigation:
        coalesce(...,0) on every diffed col + NULL-row unit test. (ADR [005].)
      R2 (med): count-screen ~165 wide -> clips on narrow terminals. Mitigation:
        accepted consciously; full set like statements; dims sortable for relevance.
      R3 (low): PG18 numeric *_bytes render with decimals. Mitigation: integer /1024
        in SQL keeps them integer-typed.
      R4 (low): forgetting synthetic io_key -> silent wrong deltas. Mitigation:
        explicit AC7 + cross-sample matching test.
    gaps: ""
    required: true

  technical_decisions:
    score: 65
    status: "partial"
    value: |
      D1: Two sub-screens (count/time) instead of one wide table.
        Chosen because pgcenter has no horizontal scroll; mirrors pgss split.
        Rejected: single wide table (cols would be cut, unreadable); aggregation by
        backend_type (loses context breakdown = the main value).
      D2: Rates only, no absolute totals.
        Rejected pgss-style absolute+delta — live tool, rate is the signal, and it
        would double width. stats_age stays absolute (wal/bgwriter pattern).
      D3: count-screen = operations AND bytes-throughput (CONFIRMED hybrid, not
        bytes-only). Bytes version-dependent: computed reads*op_bytes etc. pre-18,
        native read_bytes/write_bytes/extend_bytes on 18+. Bytes only for data-moving
        ops (reads/writes/extends, maybe writebacks); hits/evictions/reuses/fsyncs are
        counts-only. Include PG18 WAL IO (object=wal). WIDTH RISK: count-screen ~15
        cols -> may need trimming; finalize column list + width budget in Cycle 2.
      D4: Hotkeys j (toggle count<->time) + J (menu). Both free.
      D5: Hide rows where all count counters NULL/0 (SQL WHERE sum>0); coalesce diffed
        cols to 0 to stay diff-safe (replslots pattern, internal/stat/postgres.go).
      D6: THREE separate display dims (backend_type/object/context) + a synthetic md5
        io_key as UniqueKey (visible, pgss-style). Chosen over single concat so the
        per-column `/` filter stays useful for trimming ~30 rows. Cost: ~16 cols/~165
        wide; trailing cols clip on narrow terminals (accepted, standard pgcenter).
      D7: OrderKey=4 (reads / read_time = first numeric col), OrderDesc=true.
      D8: Two query branches PG16/17 vs PG18 (NOT three; PG16==PG17). Selector
        SelectStatIOQuery/SelectStatIOTimeQuery returns (query, Ncols, DiffIntvl) per
        version, bgwriter-style. Convert bytes->KiB via integer /1024 in SQL.
      D9: io_key column HIDDEN via ColsWidth[0]=0 (service-only row-matching key, md5;
        user sees readable backend_type/object/context, not the hash). Bonus: frees
        ~10 cols of width.
      D10: record/report ships as a SEPARATE 0.11.0 feature (top-first); this feature
        is top-only, NotRecordable:true. Confirmed with user (avoids XL scope).
      D11 (-> tech-spec): add PostgresV16/17/18 consts to query.go (map already uses
        query.PostgresVxx) vs literals — deferred to tech-spec, non-blocking.
      D12: helpTemplate line = "j/J - pg_stat_io operations/timings" (single line).
    gaps: ""
    required: false

