# ============================================================================
# Notes
# ============================================================================
notes: |
  Code research DONE (2026-06-21) -> 006-feat-pg-stat-io-code-research.md. Key facts:
  - PG16==PG17 (op_bytes constant); PG18 diverges (op_bytes removed; native
    read_bytes/write_bytes/extend_bytes numeric; object='wal'; context='init').
    => TWO query branches (PG16/17 vs PG18), bgwriter-style selector returning
    per-version (query, Ncols, DiffIntvl).
  - bytes only for read/write/extend (3 cols). On PG<18 derive reads*op_bytes etc.;
    convert to KiB via integer /1024 to avoid numeric/float formatting.
  - Composite identity -> synthetic col `backend_type||'/'||object||'/'||context AS
    io_key`, UniqueKey=its index (precedent statements_io queryid md5; view.go:197).
    OMITTING IT = silent wrong-delta bug.
  - coalesce(...,0) MANDATORY on every diffed col (pg_stat_io NULLs pervasive:
    fsyncs for temp relation, reads for background writer). ADR [005].
  - Hide empty rows in SQL (WHERE sum(counts)>0); keeps row-set identical on both
    sub-screens; no client-side hook exists.
  - PG14/15 UX = existing MinRequiredVersion gate -> generic "not supported" error in
    main pane. No custom message mechanism needed.
  - Registration checklist (9 sites): io.go, view.New x2, Configure x2, keybindings
    j/J, menu.go menuStatIO, config_view.go statioNextView toggle, help.go, io_test.go,
    menu_test.go {menuStatIO:2}.
  - j/J both free. j = switchViewTo "statio" + statioNextView 2-way toggle
    (copy databasesNextView). J = menuOpen(menuStatIO).
  - No PostgresV16/17/18 constants (query.go stops at V14) -> tech-spec: add them or
    use literals. Lean: add PostgresV16/17/18 (map uses query.PostgresVxx).
  - reset.go: pg_stat_io is shared stats, NOT reset by Q (like bgwriter) -> document.
  - Standby OK (startup backend does IO); no recovery-aware function needed.
  OPEN (Cycle 2): count-screen width budget (15 cols, ~160 terminal) -> trim?; display
  io_key-concat vs 3 separate dims; default OrderKey per screen; user stories/AC.
  -- ALL RESOLVED in Cycle 2 (see ui_ux/technical_decisions). --

  Phase 6 (dev-customer): needs_work. M1 two-screens-vs-reduced-single -> user CONFIRMED
  two screens (reduced single kills US3 evictions/reuses + US2 WAL fsync). M2
  record/report horizon -> SEPARATE 0.11.0 feature, top-first. Minors (track_io_timing
  hint, Q-reset doc) -> AC8/AC9.
  Phase 7 (completeness): COMPLETE (high conf), 5 minors all self-resolved: PostgresVxx
  consts (D11 -> tech-spec), help string (D12), io_key visibility (D9 hidden), stat/help.go
  (integration #10), hybrid-bytes cross-version QA (verification). No blockers.
