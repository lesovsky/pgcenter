    user_answer: |
      M1: CONFIRMED keep two screens (loss of reads+read_time cohesion is a conscious
      tradeoff; reduced single screen would kill US3 evictions/reuses + US2 WAL fsync).
      M2: record/report ships as a SEPARATE feature within v0.11.0 — implement top
